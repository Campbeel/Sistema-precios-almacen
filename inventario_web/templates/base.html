<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Inventario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="header">
        <div>
            <p class="eyebrow">Sistema interno</p>
            <h1>Sistema de inventario</h1>
        </div>
        <nav class="nav">
            <a href="{{ url_for('home.landing_view') }}">Inicio</a>
            <a href="{{ url_for('productos.listar_productos_view') }}">Inventario</a>
            <a href="{{ url_for('inventario.resumen_inventario_view') }}">Inventario total</a>
            <a href="{{ url_for('ventas.venta_view') }}">Venta</a>
        </nav>
    </header>

    <main class="layout">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="flash-group">
                    {% for category, message in messages %}
                        <article class="flash flash-{{ category }}">{{ message }}</article>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
